name: 🎬 PosmotriBot

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */5 * * *'  # перезапуск каждые 5 часов

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5 часов, убиваем сами до лимита Actions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUBGRAM_API_KEY: ${{ secrets.SUBGRAM_API_KEY }}
